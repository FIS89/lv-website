; Printers.ini
; Printer capabilities and characteristics
;
; Printers are listed in the order in which they should be displayed
; to the user.
;
; MaxDataCompressionLevel values represent the highest valid value -
; so the valid	value list runs consecutively from 0 to the value given,
; inclusive.  The	value given also represents the default value.
;
; Special Formats:
;	SmoothFontSizeInfo=((id,basePtSz[,widthDivConst[,widthMulConst[,height,intLeading,ascent]]])[,...])
;	SmoothFontCharInfo=((id,height,intLeading,ascent,width[,icGap[,hasUpper[,hasLower[,hasDia]]]])[,...])
;


